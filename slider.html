<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brands Slider</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
.fade-mask{
    -webkit-mask-image: linear-gradient(
        to right,
        transparent,
        black 10%,
        black 90%,
        transparent
    );
    mask-image: linear-gradient(
        to right,
        transparent,
        black 10%,
        black 90%,
        transparent
    );
}
</style>

</head>

<body class="bg-slate-50 py-16">

<div class="max-w-6xl mx-auto px-6 text-center mb-12">
    <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">
        <span class="text-amber-500">TOP TECHDZ</span>
        علامات اختارت
    </h2>

    <p class="text-slate-500">
        نساعد العلامات التجارية على بناء حضور رقمي أقوى وتحقيق نتائج ملموسة.
    </p>
</div>

<div class="relative max-w-7xl mx-auto px-6">
    <button id="next"
        class="absolute right-0 top-1/2 -translate-y-1/2 z-20 w-12 h-12 rounded-full bg-white shadow-lg border hover:scale-110 transition">
        ❮
    </button>

    <!-- Left Arrow -->
    <button id="prev"
        class="absolute left-0 top-1/2 -translate-y-1/2 z-20 w-12 h-12 rounded-full bg-white shadow-lg border hover:scale-110 transition">
        ❯
    </button>

    <div class="overflow-hidden fade-mask">
        <div id="track" class="flex gap-6 select-none">
            <!-- logos -->
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 1</div>
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 2</div>
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 3</div>
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 4</div>
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 5</div>
            <div class="logo w-44 h-24 shrink-0 bg-white rounded-2xl shadow border flex items-center justify-center">LOGO 6</div>

        </div>

    </div>

</div>

<div class="flex items-center justify-center w-[180px] h-[180px] bg-blue-800 rounded-[56px] rotate-45 shadow-[inset_0_0_20px_0_rgba(255,255,255,0.8)]">
  <div class="-rotate-45">
    <!-- الأيقونة أو النص هنا -->
    <svg class="w-16 h-16 text-white"><!-- speaker icon --></svg>
  </div>
</div>
<script>
const track = document.getElementById("track");
track.innerHTML += track.innerHTML;
let position = 0;
let speed = .3;
let paused = false;
function animate() {
    if (!paused) {
        position += speed;

        const halfWidth = track.scrollWidth / 2;

        if (Math.abs(position) >= halfWidth) {
            position = 0;
        }

        track.style.transform = `translateX(${position}px)`;
    }

    requestAnimationFrame(animate);
}
animate();

track.parentElement.addEventListener("mouseenter", () => {
    paused = true;
});

track.parentElement.addEventListener("mouseleave", () => {
    paused = false;
});
const step = 250;
document.getElementById("next").addEventListener("click", () => {
    position -= 250;
 
    if (position + step <= 0) {
        position += step;
        track.style.transform = `translateX(${position}px)`;
    } else {
        position = 0;
        track.style.transform = `translateX(${position}px)`;
    }
});

document.getElementById("prev").addEventListener("click", () => {
    position += 250;


});

let isDragging = false;
let startX = 0;
let startPosition = 0;

track.parentElement.addEventListener("mousedown", (e) => {
    isDragging = true;
    paused = true;

    startX = e.clientX;
    startPosition = position;

    track.parentElement.style.cursor = "grabbing";
});

window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const walk = e.clientX - startX;
    position = startPosition + walk;

    track.style.transform = `translateX(${position}px)`;
});

window.addEventListener("mouseup", () => {
    isDragging = false;
    paused = false;

    track.parentElement.style.cursor = "grab";
});

track.parentElement.style.cursor = "grab";
</script>

</body>
</html>
